<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trajectory Calc</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1.*/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flexboxgrid/6.3.1/flexboxgrid.min.css"
        type="text/css">
</head>

<body>
    <main class="container-fluid">
        <form onchange="reloadWithQueryParams()" class="grid">
            <div class="row">
                <div class="col-xs-6 col-sm-4 col-md col-lg"> 
                <fieldset>
                    <h2>Launch</h2>
                    <label for="launch-elevation">Launch Elevation (<sup>o</sup>)<input type="number"
                            id="launch-elevation" name="launchElevation" step="0.5" min="0" max="90" value="18"
                            aria-describedby="launch-elevation-helper"></label>
                    <small id="launch-elevation-helper" class="field-helper" aria-live="polite"></small>
                    <label for="launch-velocity">Launch Velocity (fps)<input type="number" id="launch-velocity"
                            name="launchVelocity" value="200"></label>
                    <label for="initial-height">Initial Height (m)<input type="number" id="initial-height"
                            name="initialHeight" step="0.1" min="0" max="200" value="1.4"
                            aria-describedby="initial-height-helper"></label>
                    <small id="initial-height-helper" class="field-helper" aria-live="polite"></small>
                    <label for="slope-percent">Slope %<input type="number" id="slope-percent" name="slopePercent"
                            step="0.05" min="-2" max="2" value="0.00" aria-describedby="slope-percent-helper"></label>
                    <small id="slope-percent-helper" class="field-helper" aria-live="polite"></small>
                </fieldset>
                </div>
               <div class="col-xs-6 col-sm-4 col-md col-lg"> 
                <fieldset>
                    <h2>Results</h2>
                    <label for="impact-distance-m">Impact Distance (m)<input type="number" id="impact-distance-m"
                            name="impactDistanceM" step="0.01" readonly></label>
                    <label for="impact-distance-yd">Impact Distance (yd)<input type="number" id="impact-distance-yd"
                            name="impactDistanceYd" step="0.01" readonly></label>
                    <label for="impact-height">Impact Height (m)<input type="number" id="impact-height"
                            name="impactHeight" step="0.01" readonly></label>
                    <label for="max-height">Max Height (m)<input type="number" id="max-height" name="maxHeight"
                            step="0.01" readonly></label>
                    <label for="flight-time">Flight Time (s)<input type="number" id="flight-time" name="flightTime"
                            step="0.01" readonly></label>
                    <label for="lateral-drift">Lateral Drift (m)<input type="number" id="lateral-drift"
                            name="lateralDrift" step="0.01" readonly></label>
                </fieldset>
                </div>
                <div class="col-xs-6 col-sm-4 col-md col-lg"> 
                <fieldset>
                    <h2>Arrow</h2>
                    <label for="arrow-weight">Weight (grains)<input type="number" id="arrow-weight" name="arrowWeight"
                            step="1" min="1" max="1000" value="632" aria-describedby="arrow-weight-helper"></label>
                    <small id="arrow-weight-helper" class="field-helper" aria-live="polite"></small>
                    <label for="long-cda">Long. CdA (mm<sup>2</sup>)<input type="number" id="long-cda" name="longCda"
                            step="1" min="0" value="120" aria-describedby="long-cda-helper"></label>
                    <small id="long-cda-helper" class="field-helper" aria-live="polite"></small>
                    <label for="lat-cda">Lat. CdA (mm<sup>2</sup>)<input type="number" id="lat-cda" name="latCda"
                            step="10" min="0" value="6500" aria-describedby="lat-cda-helper"></label>
                    <small id="lat-cda-helper" class="field-helper" aria-live="polite"></small>
                </fieldset>
                </div>
                <div class="col-xs-6 col-sm-4 col-md col-lg">  
                <fieldset>
                    <h2>Wind</h2>
                    <label for="wind-speed">Wind Speed (mph)<input type="number" id="wind-speed" name="windSpeed"
                            step="1" min="0" max="30" value="0" aria-describedby="wind-speed-helper"></label>
                    <small id="wind-speed-helper" class="field-helper" aria-live="polite"></small>
                    <label for="wind-speed-height">Wind Ref. Height (m)<input type="number" id="wind-speed-height"
                            name="windSpeedHeight" step="1" min="1" max="50" value="10"
                            aria-describedby="wind-speed-height-helper"></label>
                    <small id="wind-speed-height-helper" class="field-helper" aria-live="polite"></small>
                    <label for="wind-direction">Wind Direction (<sup>o</sup>)<input type="number" id="wind-direction"
                            name="windDirection" step="10" min="0" max="360" value="0"
                            aria-describedby="wind-direction-helper"></label>
                    <small id="wind-direction-helper" class="field-helper" aria-live="polite"></small>
                    <label for="hellman-constant">Hellman Constant<input type="number" id="hellman-constant"
                            name="hellmanConstant" step="0.05" min="0" max="0.7" value="0.15"
                            aria-describedby="hellman-constant-helper"></label>
                    <small id="hellman-constant-helper" class="field-helper" aria-live="polite"></small>
                </fieldset>
                </div>
                <div class="col-xs-6 col-sm-4 col-md col-lg"> 
                <fieldset>
                    <h2>Atmosphere</h2>
                    <label for="temperature">Temperature (°C)<input type="number" id="temperature" name="temperature"
                            step="1" min="-40" max="50" value="20" aria-describedby="temperature-helper"></label>
                    <small id="temperature-helper" class="field-helper" aria-live="polite"></small>
                    <label for="pressure">Pressure (kPa)<input type="number" id="pressure" name="pressure" step="1"
                            min="80" max="120" value="101.325" aria-describedby="pressure-helper"></label>
                    <small id="pressure-helper" class="field-helper" aria-live="polite"></small>
                    <label for="humidity">Humidity (%)<input type="number" id="humidity" name="humidity" step="1"
                            min="0" max="100" value="70" aria-describedby="humidity-helper"></label>
                    <small id="humidity-helper" class="field-helper" aria-live="polite"></small>
                    <label for="air-density">Air Density (kg/m<sup>3</sup>)<input type="number" id="air-density"
                            name="airDensity" step="0.005" min="1.0" max="1.3" readonly></label>
                </fieldset>
                </div>
            </div>
        </form>
    </main>
</body>

</html>
