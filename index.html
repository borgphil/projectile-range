<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trajectory Calc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="./index.html">Trajectory Calc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#" data-bs-toggle="modal" data-bs-target="#goalSeekModal">Goal Seek</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-bs-toggle="modal" data-bs-target="#scoreSimulatorModal">Score Simulator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <form onchange="reloadWithQueryParams()" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-5 g-3">
            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h3>Launch</h3>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="launch-elevation" name="launchElevation" step="0.1" min="0" max="90" value="18" placeholder="Launch Elevation (°)" aria-describedby="launch-elevation-helper">
                            <label for="launch-elevation">Launch Elevation (°)</label>
                        </div>
                        <div id="launch-elevation-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="launch-velocity" name="launchVelocity" value="200" placeholder="Launch Velocity (fps)" aria-describedby="launch-velocity-helper">
                            <label for="launch-velocity">Launch Velocity (fps)</label>
                        </div>
                        <div id="launch-velocity-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="initial-height" name="initialHeight" step="0.1" min="0" max="200" value="1.4" placeholder="Initial Height (m)" aria-describedby="initial-height-helper">
                            <label for="initial-height">Initial Height (m)</label>
                        </div>
                        <div id="initial-height-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="slope-percent" name="slopePercent" step="0.05" min="-2" max="2" value="0.00" placeholder="Slope %" aria-describedby="slope-percent-helper">
                            <label for="slope-percent">Slope %</label>
                        </div>
                        <div id="slope-percent-helper" class="form-text" aria-live="polite"></div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h3>Results</h3>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="impact-distance-m" name="impactDistanceM" step="0.01" placeholder="Impact Distance (m)" readonly>
                            <label for="impact-distance-m">Impact Distance (m)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="impact-distance-yd" name="impactDistanceYd" step="0.01" placeholder="Impact Distance (yd)" readonly>
                            <label for="impact-distance-yd">Impact Distance (yd)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="impact-height" name="impactHeight" step="0.01" placeholder="Impact Height (m)" readonly>
                            <label for="impact-height">Impact Height (m)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="impact-angle" name="impactAngle" step="0.01" placeholder="Impact Angle (°)" readonly>
                            <label for="impact-angle">Impact Angle (°)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="max-height" name="maxHeight" step="0.01" placeholder="Max Height (m)" readonly>
                            <label for="max-height">Max Height (m)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="flight-time" name="flightTime" step="0.01" placeholder="Flight Time (s)" readonly>
                            <label for="flight-time">Flight Time (s)</label>
                        </div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="lateral-drift" name="lateralDrift" step="0.01" placeholder="Lateral Drift (m)" readonly>
                            <label for="lateral-drift">Lateral Drift (m)</label>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h3>Arrow</h3>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="arrow-weight" name="arrowWeight" step="1" min="1" max="1000" value="632" placeholder="Weight (grains)" aria-describedby="arrow-weight-helper">
                            <label for="arrow-weight">Weight (grains)</label>
                        </div>
                        <div id="arrow-weight-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="long-cda" name="longCda" step="1" min="0" value="120" placeholder="Long. CdA (mm²)" aria-describedby="long-cda-helper">
                            <label for="long-cda">Long. CdA (mm²)</label>
                        </div>
                        <div id="long-cda-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="lat-cda" name="latCda" step="10" min="0" value="6500" placeholder="Lat. CdA (mm²)" aria-describedby="lat-cda-helper">
                            <label for="lat-cda">Lat. CdA (mm²)</label>
                        </div>
                        <div id="lat-cda-helper" class="form-text" aria-live="polite"></div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h3>Wind</h3>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="wind-speed" name="windSpeed" step="1" min="0" max="30" value="0" placeholder="Wind Speed (mph)" aria-describedby="wind-speed-helper">
                            <label for="wind-speed">Wind Speed (mph)</label>
                        </div>
                        <div id="wind-speed-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="wind-speed-height" name="windSpeedHeight" step="1" min="1" max="50" value="10" placeholder="Wind Ref. Height (m)" aria-describedby="wind-speed-height-helper">
                            <label for="wind-speed-height">Wind Ref. Height (m)</label>
                        </div>
                        <div id="wind-speed-height-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="wind-direction" name="windDirection" step="10" min="0" max="360" value="0" placeholder="Wind Direction (°)" aria-describedby="wind-direction-helper">
                            <label for="wind-direction">Wind Direction (°)</label>
                        </div>
                        <div id="wind-direction-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="hellman-constant" name="hellmanConstant" step="0.05" min="0" max="0.7" value="0.15" placeholder="Hellman Constant" aria-describedby="hellman-constant-helper">
                            <label for="hellman-constant">Hellman Constant</label>
                        </div>
                        <div id="hellman-constant-helper" class="form-text" aria-live="polite"></div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h3>Atmosphere</h3>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="temperature" name="temperature" step="1" min="-40" max="50" value="20" placeholder="Temperature (°C)" aria-describedby="temperature-helper">
                            <label for="temperature">Temperature (°C)</label>
                        </div>
                        <div id="temperature-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="pressure" name="pressure" step="1" min="80" max="120" value="101.325" placeholder="Pressure (kPa)" aria-describedby="pressure-helper">
                            <label for="pressure">Pressure (kPa)</label>
                        </div>
                        <div id="pressure-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="humidity" name="humidity" step="1" min="0" max="100" value="70" placeholder="Humidity (%)" aria-describedby="humidity-helper">
                            <label for="humidity">Humidity (%)</label>
                        </div>
                        <div id="humidity-helper" class="form-text" aria-live="polite"></div>
                        <div class="form-floating">
                            <input type="number" class="form-control" id="air-density" name="airDensity" step="0.005" min="1.0" max="1.3" placeholder="Air Density (kg/m³)" readonly>
                            <label for="air-density">Air Density (kg/m³)</label>
                        </div>
                    </div>
                </section>
            </div>
        </form>
    </main>

    <div class="modal fade" id="goalSeekModal" tabindex="-1" aria-labelledby="goalSeekModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="goalSeekModalLabel">Goal Seek</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="goalSeekForm" novalidate>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="goal-seek-set" name="goalSeekSet" placeholder="Set">
                                <option value="impact-distance-yd">Impact Distance (yd)</option>
                                <option value="impact-distance-m">Impact Distance (m)</option>
                            </select>
                            <label for="goal-seek-set">Set</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="goal-seek-target" name="goalSeekTarget" step="0.01" inputmode="decimal" value="185" placeholder="To value">
                            <label for="goal-seek-target">To value</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="goal-seek-change" name="goalSeekChange" placeholder="By changing">
                                <option value="launch-elevation">Launch Elevation</option>
                                <option value="launch-velocity">Launch Velocity</option>
                                <option value="long-cda">Long. CdA</option>
                            </select>
                            <label for="goal-seek-change">By changing</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="goal-seek-submit">Goal Seek</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="scoreSimulatorModal" tabindex="-1" aria-labelledby="scoreSimulatorModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="scoreSimulatorModalLabel">Score Simulator</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="scoreSimulatorForm" novalidate>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="archer-accuracy" name="archerAccuracy" step="0.01" min="0" max="5" value="0.20" placeholder="Archer Accuracy (degrees)">
                            <label for="archer-accuracy">Archer Accuracy (degrees)</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="wind-gust" name="windGust" step="1" min="0" max="100" value="30" placeholder="Wind Gust (%)">
                            <label for="wind-gust">Wind Gust (%)</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="shots" name="shots" step="1" min="1" max="1000" value="72" placeholder="Shots">
                            <label for="shots">Shots</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="score-type" name="scoreType" placeholder="Score Type">
                                <option value="Imperial">Imperial</option>
                                <option value="Metric">Metric</option>
                            </select>
                            <label for="score-type">Score Type</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="score-simulator-result" name="scoreSimulatorResult" placeholder="Simulated Score" readonly>
                            <label for="score-simulator-result">Simulated Score</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="score-simulate-submit">Simulate</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
