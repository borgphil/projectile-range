<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trajectory Calc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="./index.html">Trajectory Calc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#" data-bs-toggle="modal" data-bs-target="#goalSeekModal">Goal Seek</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <form onchange="reloadWithQueryParams()" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-5">
            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h2 class="h4">Launch</h2>
                        <div>
                            <label for="launch-elevation" class="form-label">Launch Elevation (°)</label>
                            <input type="number" class="form-control" id="launch-elevation" name="launchElevation" step="0.1" min="0" max="90" value="18" aria-describedby="launch-elevation-helper">
                            <div id="launch-elevation-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="launch-velocity" class="form-label">Launch Velocity (fps)</label>
                            <input type="number" class="form-control" id="launch-velocity" name="launchVelocity" value="200">
                        </div>
                        <div>
                            <label for="initial-height" class="form-label">Initial Height (m)</label>
                            <input type="number" class="form-control" id="initial-height" name="initialHeight" step="0.1" min="0" max="200" value="1.4" aria-describedby="initial-height-helper">
                            <div id="initial-height-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="slope-percent" class="form-label">Slope %</label>
                            <input type="number" class="form-control" id="slope-percent" name="slopePercent" step="0.05" min="-2" max="2" value="0.00" aria-describedby="slope-percent-helper">
                            <div id="slope-percent-helper" class="form-text" aria-live="polite"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h2 class="h4">Results</h2>
                        <div>
                            <label for="impact-distance-m" class="form-label">Impact Distance (m)</label>
                            <input type="number" class="form-control" id="impact-distance-m" name="impactDistanceM" step="0.01" readonly>
                        </div>
                        <div>
                            <label for="impact-distance-yd" class="form-label">Impact Distance (yd)</label>
                            <input type="number" class="form-control" id="impact-distance-yd" name="impactDistanceYd" step="0.01" readonly>
                        </div>
                        <div>
                            <label for="impact-height" class="form-label">Impact Height (m)</label>
                            <input type="number" class="form-control" id="impact-height" name="impactHeight" step="0.01" readonly>
                        </div>
                        <div>
                            <label for="max-height" class="form-label">Max Height (m)</label>
                            <input type="number" class="form-control" id="max-height" name="maxHeight" step="0.01" readonly>
                        </div>
                        <div>
                            <label for="flight-time" class="form-label">Flight Time (s)</label>
                            <input type="number" class="form-control" id="flight-time" name="flightTime" step="0.01" readonly>
                        </div>
                        <div>
                            <label for="lateral-drift" class="form-label">Lateral Drift (m)</label>
                            <input type="number" class="form-control" id="lateral-drift" name="lateralDrift" step="0.01" readonly>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h2 class="h4">Arrow</h2>
                        <div>
                            <label for="arrow-weight" class="form-label">Weight (grains)</label>
                            <input type="number" class="form-control" id="arrow-weight" name="arrowWeight" step="1" min="1" max="1000" value="632" aria-describedby="arrow-weight-helper">
                            <div id="arrow-weight-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="long-cda" class="form-label">Long. CdA (mm²)</label>
                            <input type="number" class="form-control" id="long-cda" name="longCda" step="1" min="0" value="120" aria-describedby="long-cda-helper">
                            <div id="long-cda-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="lat-cda" class="form-label">Lat. CdA (mm²)</label>
                            <input type="number" class="form-control" id="lat-cda" name="latCda" step="10" min="0" value="6500" aria-describedby="lat-cda-helper">
                            <div id="lat-cda-helper" class="form-text" aria-live="polite"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h2 class="h4">Wind</h2>
                        <div>
                            <label for="wind-speed" class="form-label">Wind Speed (mph)</label>
                            <input type="number" class="form-control" id="wind-speed" name="windSpeed" step="1" min="0" max="30" value="0" aria-describedby="wind-speed-helper">
                            <div id="wind-speed-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="wind-speed-height" class="form-label">Wind Ref. Height (m)</label>
                            <input type="number" class="form-control" id="wind-speed-height" name="windSpeedHeight" step="1" min="1" max="50" value="10" aria-describedby="wind-speed-height-helper">
                            <div id="wind-speed-height-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div class="mb-3">
                            <label for="wind-direction" class="form-label">Wind Direction (°)</label>
                            <input type="number" class="form-control" id="wind-direction" name="windDirection" step="10" min="0" max="360" value="0" aria-describedby="wind-direction-helper">
                            <div id="wind-direction-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="hellman-constant" class="form-label">Hellman Constant</label>
                            <input type="number" class="form-control" id="hellman-constant" name="hellmanConstant" step="0.05" min="0" max="0.7" value="0.15" aria-describedby="hellman-constant-helper">
                            <div id="hellman-constant-helper" class="form-text" aria-live="polite"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col">
                <section class="card">
                    <div class="card-body">
                        <h2 class="h4">Atmosphere</h2>
                        <div>
                            <label for="temperature" class="form-label">Temperature (°C)</label>
                            <input type="number" class="form-control" id="temperature" name="temperature" step="1" min="-40" max="50" value="20" aria-describedby="temperature-helper">
                            <div id="temperature-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="pressure" class="form-label">Pressure (kPa)</label>
                            <input type="number" class="form-control" id="pressure" name="pressure" step="1" min="80" max="120" value="101.325" aria-describedby="pressure-helper">
                            <div id="pressure-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="humidity" class="form-label">Humidity (%)</label>
                            <input type="number" class="form-control" id="humidity" name="humidity" step="1" min="0" max="100" value="70" aria-describedby="humidity-helper">
                            <div id="humidity-helper" class="form-text" aria-live="polite"></div>
                        </div>
                        <div>
                            <label for="air-density" class="form-label">Air Density (kg/m³)</label>
                            <input type="number" class="form-control" id="air-density" name="airDensity" step="0.005" min="1.0" max="1.3" readonly>
                        </div>
                    </div>
                </section>
            </div>
        </form>
    </main>

    <div class="modal fade" id="goalSeekModal" tabindex="-1" aria-labelledby="goalSeekModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="goalSeekModalLabel">Goal Seek</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="goalSeekForm" novalidate>
                        <div class="mb-3">
                            <label for="goal-seek-set" class="form-label">Set</label>
                            <select class="form-select" id="goal-seek-set" name="goalSeekSet">
                                <option value="impact-distance-m">Impact Distance (m)</option>
                                <option value="impact-distance-yd">Impact Distance (yd)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="goal-seek-target" class="form-label">To value</label>
                            <input type="number" class="form-control" id="goal-seek-target" name="goalSeekTarget" step="0.01" inputmode="decimal" value="185">
                        </div>
                        <div class="mb-3">
                            <label for="goal-seek-change" class="form-label">By changing</label>
                            <select class="form-select" id="goal-seek-change" name="goalSeekChange">
                                <option value="launch-elevation">Launch Elevation</option>
                                <option value="launch-velocity">Launch Velocity</option>
                                <option value="long-cda">Long. CdA</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="goal-seek-submit">Goal Seek</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
